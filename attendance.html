<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer v1.0 - Davomat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Admin Customer</span>
                    <span class="brand-version">v1.0</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="teachers.html" class="nav-link">
                    <i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teachers">O'qituvchilar</span>
                </a>
                <a href="students.html" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> <span data-i18n="students">O'quvchilar</span>
                </a>
                <a href="payments.html" class="nav-link">
                    <i class="fas fa-money-bill"></i> <span data-i18n="payments">To'lovlar</span>
                </a>
                <a href="attendance.html" class="nav-link active">
                    <i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i> <span data-i18n="reports">Hisobotlar</span>
                </a>
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i> <span data-i18n="subjects">Fanlar</span>
                </a>
                <a href="all.html" class="nav-link">
                    <i class="fas fa-th-list"></i> <span data-i18n="all">Barchasi</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i> <span data-i18n="settings">Sozlamalar</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Chiqish</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2><i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span></h2>
                        <p class="text-muted">Kunlik real time davomat</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">
                            <span id="userInitial">C</span>
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Customer</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sana tanlash -->
            <section style="padding: 12px 24px;">
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                    <label style="font-weight:500;font-size:0.85rem;"><i class="fas fa-calendar-day"></i> Sana:</label>
                    <input type="date" id="attendanceDate" style="padding:8px 14px;border:2px solid var(--border-color);border-radius:10px;background:var(--bg-input);color:var(--text-primary);font-size:0.85rem;" />
                    <button onclick="loadAttendanceData()" class="btn-secondary" style="width:auto;padding:8px 18px;font-size:0.8rem;">
                        <i class="fas fa-sync-alt"></i> Yangilash
                    </button>
                </div>
            </section>

            <!-- Attendance Grid -->
            <section class="attendance-page-grid">
                <!-- Teachers Attendance -->
                <div class="attendance-page-card">
                    <div class="card-header">
                        <h3><i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teachers">O'qituvchilar</span></h3>
                        <span class="date" id="todayDate"></span>
                    </div>
                    <div id="teachersAttendanceList">
                        <div class="text-muted" style="text-align:center;padding:20px 0;" data-i18n="loading">Yuklanmoqda...</div>
                    </div>
                </div>

                <!-- Students Attendance -->
                <div class="attendance-page-card">
                    <div class="card-header">
                        <h3><i class="fas fa-graduation-cap"></i> <span data-i18n="students">O'quvchilar</span></h3>
                        <span class="date" id="todayDate2"></span>
                    </div>
                    <div id="studentsAttendanceList">
                        <div class="text-muted" style="text-align:center;padding:20px 0;" data-i18n="loading">Yuklanmoqda...</div>
                    </div>
                </div>
            </section>

            <!-- Attendance History -->
            <section style="padding: 0 24px 24px;">
                <div class="chart-card">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3 style="font-size:0.9rem;font-weight:600;"><i class="fas fa-history"></i> Davomat tarixi</h3>
                        <span class="text-muted" style="font-size:0.7rem;" id="historyDate"></span>
                    </div>
                    <div id="attendanceHistoryList">
                        <div class="text-muted" style="text-align:center;padding:20px 0;">Yuklanmoqda...</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
