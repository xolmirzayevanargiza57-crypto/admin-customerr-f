<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Main - Bildirishnomalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/inputs.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <span>Admin Main</span>
                <span class="brand-version">v1.0</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" data-nav-label="navDashboard">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="admins.html" class="nav-link" data-nav-label="navAdmins">
                    <i class="fas fa-users"></i> Admin Customerlar
                </a>
                <a href="admin-add.html" class="nav-link" data-nav-label="navAdd">
                    <i class="fas fa-user-plus"></i> Yangi Admin
                </a>
                <a href="notifications.html" class="nav-link active" data-nav-label="navNotifications">
                    <i class="fas fa-bell"></i> Bildirishnomalar
                </a>
                <a href="settings.html" class="nav-link" data-nav-label="navSettings">
                    <i class="fas fa-cog"></i> Sozlamalar
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2><i class="fas fa-bell"></i> Bildirishnomalar</h2>
                        <p class="text-muted">Barcha xabarlar va bildirishnomalar</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">
                            <span id="userInitial">A</span>
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Main</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Filter Tugmalari -->
            <section class="toolbar" style="padding: 12px 24px; border-bottom: 1px solid var(--border-color);">
                <div class="filter-box" style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                    <button id="filterAll" class="filter-pill active" data-filter="all">
                        <i class="fas fa-list"></i> Barchasi
                    </button>
                    <button id="filterToday" class="filter-pill" data-filter="today">
                        <i class="fas fa-calendar-day"></i> Bugun
                    </button>
                    <button id="filterWeek" class="filter-pill" data-filter="week">
                        <i class="fas fa-calendar-week"></i> Shu hafta
                    </button>
                    <button id="filterMonth" class="filter-pill" data-filter="month">
                        <i class="fas fa-calendar-alt"></i> Shu oy
                    </button>
                    <button id="filterUnread" class="filter-pill" data-filter="unread">
                        <i class="fas fa-envelope"></i> O'qilmagan
                    </button>
                    <button id="filterRead" class="filter-pill" data-filter="read">
                        <i class="fas fa-check-double"></i> O'qilgan
                    </button>
                    <button id="refreshNotifications" class="btn-secondary" style="width: auto; padding: 6px 16px; font-size: 0.75rem;">
                        <i class="fas fa-sync-alt"></i> Yangilash
                    </button>
                    <button id="markAllRead" class="btn-secondary" style="width: auto; padding: 6px 16px; font-size: 0.75rem;">
                        <i class="fas fa-check-double"></i> Hammasini o'qilgan deb belgilash
                    </button>
                </div>
            </section>

            <!-- Xabarlar Ro'yxati -->
            <section class="notifications-container" style="padding: 16px 24px 24px 24px; overflow-y: auto; flex: 1;">
                <div id="notificationsList" class="notifications-list">
                    <div class="notif-loading" style="text-align: center; padding: 40px 0;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 12px; color: var(--text-muted);">Yuklanmoqda...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <style>
        .notifications-container {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }

        .notifications-container::-webkit-scrollbar {
            width: 6px;
        }

        .notifications-container::-webkit-scrollbar-track {
            background: var(--bg-hover);
            border-radius: 10px;
        }

        .notifications-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .notifications-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .filter-pill {
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .filter-pill:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
        }

        .filter-pill.active {
            border-color: var(--border-focus);
            background: var(--bg-active);
            color: var(--text-primary);
        }

        [data-theme="dark"] .filter-pill.active {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        /* Notification Item */
        .notification-item {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .notification-item:hover {
            background: var(--bg-hover);
        }

        .notification-item.unread {
            background: var(--bg-hover);
            border-left: 4px solid #007aff;
        }

        .notification-item .notification-body {
            flex: 1;
            min-width: 0;
        }

        .notification-item .notification-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 4px;
        }

        .notification-item .notification-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0 0 8px 0;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .notification-item .notification-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .notification-item .notification-meta i {
            margin-right: 4px;
        }

        .notification-item .notification-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .notification-item .notification-actions .btn-read {
            background: none;
            border: 1px solid #007aff;
            color: #007aff;
            font-size: 0.68rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .notification-item .notification-actions .btn-read:hover {
            background: #007aff;
            color: #fff;
        }

        .notification-item .notification-actions .btn-delete {
            background: none;
            border: 1px solid #ff3b30;
            color: #ff3b30;
            font-size: 0.68rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .notification-item .notification-actions .btn-delete:hover {
            background: #ff3b30;
            color: #fff;
        }

        .notification-item .notification-actions .read-label {
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        .notification-date-group {
            margin-bottom: 16px;
        }

        .notification-date-group .date-header {
            padding: 8px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notif-empty {
            text-align: center;
            padding: 60px 0;
        }

        .notif-empty i {
            font-size: 3rem;
            opacity: 0.3;
            display: block;
            margin-bottom: 16px;
        }

        .notif-empty p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .notif-empty .sub-text {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar .filter-box {
                flex-wrap: wrap;
            }
            
            .filter-pill {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            
            .notification-item {
                flex-direction: column;
                padding: 12px 14px;
            }
            
            .notification-item .notification-actions {
                width: 100%;
                justify-content: flex-start;
                margin-top: 6px;
            }
            
            .notifications-container {
                padding: 12px 16px 16px 16px;
            }
        }

        @media (max-width: 480px) {
            .filter-pill {
                font-size: 0.65rem;
                padding: 3px 8px;
            }
            
            .notification-item .notification-title {
                font-size: 0.85rem;
            }
            
            .notification-item .notification-message {
                font-size: 0.78rem;
            }
            
            .notification-item .notification-meta {
                font-size: 0.6rem;
                gap: 8px;
            }
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/language.js"></script>
    <script src="js/app.js"></script>
    <script src="js/notifications-page.js"></script>
</body>
</html>
