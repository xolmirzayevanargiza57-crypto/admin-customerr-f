<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer - Bildirishnomalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/input.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Admin Customer</span>
                    <span class="brand-version">v1.0</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="teachers.html" class="nav-link">
                    <i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teachers">O'qituvchilar</span>
                </a>
                <a href="students.html" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> <span data-i18n="students">O'quvchilar</span>
                </a>
                <a href="payments.html" class="nav-link">
                    <i class="fas fa-money-bill"></i> <span data-i18n="payments">To'lovlar</span>
                </a>
                <a href="attendance.html" class="nav-link">
                    <i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i> <span data-i18n="reports">Hisobotlar</span>
                </a>
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i> <span data-i18n="subjects">Fanlar</span>
                </a>
                <a href="all.html" class="nav-link">
                    <i class="fas fa-th-list"></i> <span data-i18n="all">Barchasi</span>
                </a>
                <a href="notifications.html" class="nav-link active">
                    <i class="fas fa-bell"></i> <span data-i18n="notifications">Bildirishnomalar</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i> <span data-i18n="settings">Sozlamalar</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Chiqish</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2><i class="fas fa-bell"></i> Bildirishnomalar</h2>
                        <p class="text-muted">Barcha xabarlar va bildirishnomalar</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                    <div class="user-profile">
                        <div class="user-avatar"><span id="userInitial">A</span></div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Customer</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- FILTER -->
            <section class="toolbar" style="padding: 12px 24px; border-bottom: 1px solid var(--border-color);">
                <div class="filter-box" style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button id="filterAll" class="filter-pill active" data-filter="all">Barchasi</button>
                    <button id="filterUnread" class="filter-pill" data-filter="unread">O'qilmagan</button>
                    <button id="filterRead" class="filter-pill" data-filter="read">O'qilgan</button>
                    <button id="markAllRead" class="btn-secondary" style="width: auto; padding: 6px 16px; font-size: 0.75rem;">
                        <i class="fas fa-check-double"></i> Hammasini o'qilgan deb belgilash
                    </button>
                    <button id="refreshNotifications" class="btn-secondary" style="width: auto; padding: 6px 16px; font-size: 0.75rem;">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </section>

            <!-- NOTIFICATIONS LIST -->
            <section class="notifications-container" style="padding: 16px 24px 24px 24px; overflow-y: auto; flex: 1;">
                <div id="notificationsList" class="notifications-list">
                    <div class="notif-loading" style="text-align: center; padding: 40px 0;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 12px; color: var(--text-muted);">Yuklanmoqda...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <style>
        .notifications-container {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }

        .notifications-container::-webkit-scrollbar {
            width: 6px;
        }

        .notifications-container::-webkit-scrollbar-track {
            background: var(--bg-hover);
            border-radius: 10px;
        }

        .notifications-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .notifications-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .filter-pill {
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-pill:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
        }

        .filter-pill.active {
            border-color: var(--border-focus);
            background: var(--bg-active);
            color: var(--text-primary);
        }

        [data-theme="dark"] .filter-pill.active {
            background: var(--text-primary);
            color: var(--bg-primary);
        }
    </style>

    <script>
        window.__API_BASE_URL__ = 'https://admin-customerr.onrender.com';
    </script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
