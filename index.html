<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer v1.0 - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>Admin Customer</h1>
                <p class="text-muted" data-i18n="login">Tizimga kiring</p>
                <p class="text-muted" style="font-size:0.7rem; margin-top:4px;">v1.0</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> <span data-i18n="email">Email</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="customer@example.com" required autocomplete="email" data-i18n-placeholder="email_placeholder" />
                        <i class="fas fa-check-circle input-icon success"></i>
                        <i class="fas fa-exclamation-circle input-icon error"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> <span data-i18n="password">Parol</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" data-i18n-placeholder="password_placeholder" />
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> <span data-i18n="login_btn">Kirish</span>
                </button>
            </form>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Email yoki parol noto'g'ri</span>
            </div>

            <div class="login-footer">
                <span data-i18n="copyright">© 2026 Admin Customer</span>
                <span class="divider">•</span>
                <span data-i18n="version">v1.0</span>
            </div>
        </div>
    </div>

    <script>
        window.__API_BASE_URL__ = 'https://admin-customerr.onrender.com';
    </script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
