<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer - Bildirishnomalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/input.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <style>
        /* ============================================================
           NOTIFICATIONS PAGE STYLES
           ============================================================ */
        .notifications-container {
            padding: 16px 24px 24px 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .notification-item:hover {
            border-color: var(--text-muted);
        }

        .notification-item.unread {
            border-left: 4px solid #007aff;
            background: var(--bg-hover);
        }

        .notification-body {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .notification-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .notification-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .btn-read {
            background: none;
            border: 1px solid #007aff;
            color: #007aff;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .btn-read:hover {
            background: #007aff;
            color: #fff;
        }

        .btn-delete {
            background: none;
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .btn-delete:hover {
            background: var(--color-danger);
            color: #fff;
        }

        .read-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 4px 0;
        }

        .notification-empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .notification-empty i {
            font-size: 3rem;
            display: block;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .filter-bar {
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-pill {
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .filter-pill:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .filter-pill.active {
            border-color: #007aff;
            background: #007aff;
            color: #fff;
        }

        [data-theme="dark"] .filter-pill.active {
            border-color: #4a9aff;
            background: #1a2a4a;
            color: #4a9aff;
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .filter-actions .btn-secondary {
            padding: 6px 14px;
            font-size: 0.78rem;
            width: auto;
        }

        @media (max-width: 768px) {
            .notifications-container {
                padding: 12px 16px 16px 16px;
            }

            .filter-bar {
                padding: 10px 16px;
                flex-direction: column;
                align-items: stretch;
            }

            .filter-actions {
                margin-left: 0;
            }

            .notification-item {
                flex-direction: column;
            }

            .notification-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .notification-meta {
                gap: 8px;
                font-size: 0.65rem;
            }
        }

        @media (max-width: 480px) {
            .filter-pill {
                font-size: 0.7rem;
                padding: 4px 10px;
            }

            .notification-title {
                font-size: 0.85rem;
            }

            .notification-message {
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">

            <nav class="sidebar-nav">

                <a href="teachers.html" class="nav-link"><i class="fas fa-chalkboard-teacher"></i> O'qituvchilar</a>
                <a href="students.html" class="nav-link"><i class="fas fa-graduation-cap"></i> O'quvchilar</a>
                <a href="payments.html" class="nav-link"><i class="fas fa-money-bill"></i> To'lovlar</a>
                <a href="attendance.html" class="nav-link"><i class="fas fa-calendar-check"></i> Davomat</a>
                <a href="reports.html" class="nav-link"><i class="fas fa-file-alt"></i> Hisobotlar</a>
                <a href="subjects.html" class="nav-link"><i class="fas fa-book"></i> Fanlar</a>

            </nav>
            <div class="sidebar-footer">

            </div>
        </aside>

        <!-- ==================== SIDEBAR OVERLAY (HAMBURGER UCHUN) ==================== -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h2><i class="fas fa-bell"></i> Bildirishnomalar</h2>
                        <p class="text-muted">Barcha xabarlar va bildirishnomalar</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-avatar"><span id="userInitial">A</span></div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Customer</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- FILTER BAR -->
            <div class="filter-bar">
                <div class="filter-pills">
                    <button class="filter-pill active" data-filter="all">Barchasi</button>
                    <button class="filter-pill" data-filter="today">Bugun</button>
                    <button class="filter-pill" data-filter="week">Shu hafta</button>
                    <button class="filter-pill" data-filter="month">Shu oy</button>
                    <button class="filter-pill" data-filter="unread">O'qilmagan</button>
                    <button class="filter-pill" data-filter="read">O'qilgan</button>
                </div>
                <div class="filter-actions">
                    <button id="refreshBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Yangilash</button>
                    <button id="markAllReadBtn" class="btn-secondary"><i class="fas fa-check-double"></i> Hammasini o'qildi</button>
                </div>
            </div>

            <!-- NOTIFICATIONS LIST -->
            <section class="notifications-container">
                <div id="notificationsList" class="notifications-list">
                    <div class="notification-empty">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Yuklanmoqda...</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun" style="display:none;"></i>
    </button>

    <script>

</body>
