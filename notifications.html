<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer - Bildirishnomalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/input.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <style>
        /* =============================================
           NOTIFICATIONS PAGE — PAGE-SPECIFIC STYLES
           ============================================= */

        /* === SIDEBAR FIX: faqat bitta qoida, conflict yo'q === */
        .sidebar {
            position: fixed !important;
            top: 0;
            left: 0;
            bottom: 0;
            height: 100vh;
            z-index: 200;
            transform: none; /* desktop: doim ko'rinadi */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            max-width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* === FILTER TUGMALAR — inline style o'rniga CSS === */
        .filter-bar {
            padding: 14px 20px 10px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            font-weight: 500;
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .filter-pill:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .filter-pill.active {
            border-color: #007aff;
            background: #007aff;
            color: #fff;
        }

        .filter-pill.active i {
            color: #fff;
        }

        [data-theme="dark"] .filter-pill.active {
            border-color: #4a9aff;
            background: #1a2a4a;
            color: #4a9aff;
        }

        /* === ACTION TUGMALAR === */
        .filter-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .filter-actions .btn-secondary {
            padding: 7px 16px;
            font-size: 0.78rem;
            width: auto;
        }

        /* === NOTIFICATIONS CONTAINER === */
        .notifications-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 24px 20px;
        }

        .notifications-container::-webkit-scrollbar {
            width: 5px;
        }
        .notifications-container::-webkit-scrollbar-track {
            background: var(--bg-hover);
            border-radius: 10px;
        }
        .notifications-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .notifications-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* === NOTIFICATION ITEM === */
        .notification-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            border-left: 3px solid transparent;
            transition: background 0.2s ease;
            border-radius: 0;
        }

        .notification-item:hover {
            background: var(--bg-hover);
        }

        .notification-item.unread {
            background: var(--bg-hover);
            border-left-color: #007aff;
        }

        .notification-body {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 5px;
        }

        .notification-message-wrapper {
            max-height: 90px;
            overflow-y: auto;
            padding-right: 4px;
            margin: 4px 0;
        }

        .notification-message {
            font-size: 0.83rem;
            color: var(--text-secondary);
            margin: 0;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .notification-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .notification-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: flex-start;
        }

        .btn-read {
            background: none;
            border: 1px solid #007aff;
            color: #007aff;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .btn-read:hover {
            background: #007aff;
            color: #fff;
        }

        .read-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 4px 0;
        }

        /* === DATE GROUP === */
        .notification-date-group {
            margin-bottom: 20px;
        }

        .date-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 8px;
        }

        /* === HAMBURGER — MOBILE === */
        @media (max-width: 768px) {
            /* Sidebar mobilda yashirin, hamburger ochadi */
            .sidebar {
                transform: translateX(-100%) !important;
                width: 270px !important;
                min-width: 270px !important;
                max-width: 270px !important;
                z-index: 300 !important;
            }

            .sidebar.open {
                transform: translateX(0) !important;
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.18) !important;
            }

            /* Main content mobilda to'liq kenglikda */
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }

            /* Hamburger ko'rinadi */
            .menu-toggle {
                display: flex !important;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                border-radius: 8px;
                transition: background 0.2s;
            }

            .menu-toggle:hover {
                background: var(--bg-hover);
            }

            /* Filter pills mobilda kichikroq */
            .filter-pill {
                font-size: 0.72rem;
                padding: 6px 10px;
            }

            .filter-bar {
                padding: 10px 14px 8px 14px;
            }

            .notifications-container {
                padding: 12px 14px 20px 14px;
            }

            /* Notification item mobilda column */
            .notification-item {
                flex-direction: column;
                gap: 8px;
            }

            .notification-actions {
                width: 100%;
            }

            .notification-meta {
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .filter-pill {
                font-size: 0.68rem;
                padding: 5px 9px;
                gap: 4px;
            }

            .filter-pills {
                gap: 6px;
            }

            .notification-title {
                font-size: 0.85rem;
            }

            .notification-message {
                font-size: 0.78rem;
            }

            .filter-actions .btn-secondary {
                font-size: 0.72rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Admin Customer</span>
                    <span class="brand-version">v1.0</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="teachers.html" class="nav-link">
                    <i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teachers">O'qituvchilar</span>
                </a>
                <a href="students.html" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> <span data-i18n="students">O'quvchilar</span>
                </a>
                <a href="payments.html" class="nav-link">
                    <i class="fas fa-money-bill"></i> <span data-i18n="payments">To'lovlar</span>
                </a>
                <a href="attendance.html" class="nav-link">
                    <i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i> <span data-i18n="reports">Hisobotlar</span>
                </a>
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i> <span data-i18n="subjects">Fanlar</span>
                </a>
                <a href="all.html" class="nav-link">
                    <i class="fas fa-th-list"></i> <span data-i18n="all">Barchasi</span>
                </a>
                <a href="notifications.html" class="nav-link active">
                    <i class="fas fa-bell"></i> <span data-i18n="notifications">Bildirishnomalar</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i> <span data-i18n="settings">Sozlamalar</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Chiqish</span>
                </button>
            </div>
        </aside>

        <!-- Overlay (hamburger uchun) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <!-- Hamburger tugma — mobilda ko'rinadi -->
                    <button id="menuToggle" class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h2><i class="fas fa-bell"></i> Bildirishnomalar</h2>
                        <p class="text-muted">Barcha xabarlar va bildirishnomalar</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                    <div class="user-profile">
                        <div class="user-avatar"><span id="userInitial">A</span></div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Customer</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- FILTER TUGMALARI -->
            <div class="filter-bar">
                <div class="filter-pills">
                    <button class="filter-pill active" id="filterAll" data-filter="all">
                        <i class="fas fa-list"></i> Barchasi
                    </button>
                    <button class="filter-pill" id="filterToday" data-filter="today">
                        <i class="fas fa-calendar-day"></i> Bugun
                    </button>
                    <button class="filter-pill" id="filterWeek" data-filter="week">
                        <i class="fas fa-calendar-week"></i> Shu hafta
                    </button>
                    <button class="filter-pill" id="filterMonth" data-filter="month">
                        <i class="fas fa-calendar-alt"></i> Shu oy
                    </button>
                    <button class="filter-pill" id="filterUnread" data-filter="unread">
                        <i class="fas fa-envelope"></i> O'qilmagan
                    </button>
                    <button class="filter-pill" id="filterRead" data-filter="read">
                        <i class="fas fa-check-double"></i> O'qilgan
                    </button>
                </div>
                <div class="filter-actions">
                    <button id="refreshNotifications" class="btn-secondary">
                        <i class="fas fa-sync-alt"></i> Yangilash
                    </button>
                    <button id="markAllRead" class="btn-secondary">
                        <i class="fas fa-check-double"></i> Hammasini o'qilgan deb belgilash
                    </button>
                </div>
            </div>

            <!-- XABARLAR RO'YXATI -->
            <section class="notifications-container">
                <div id="notificationsList" class="notifications-list">
                    <div style="text-align: center; padding: 50px 0;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--text-muted);"></i>
                        <p style="margin-top: 14px; color: var(--text-muted);">Yuklanmoqda...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <script>
        window.__API_BASE_URL__ = 'https://admin-customerr.onrender.com';

</body>
