<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer v1.0 - Sozlamalar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <div class="brand-text">
                    <span class="brand-name">Admin Customer</span>
                    <span class="brand-version">v1.0</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="teachers.html" class="nav-link">
                    <i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teachers">O'qituvchilar</span>
                </a>
                <a href="students.html" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> <span data-i18n="students">O'quvchilar</span>
                </a>
                <a href="payments.html" class="nav-link">
                    <i class="fas fa-money-bill"></i> <span data-i18n="payments">To'lovlar</span>
                </a>
                 <a href="attendance.html" class="nav-link">
                    <i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span>
                </a>
                <a href="reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i> <span data-i18n="reports">Hisobotlar</span>
                </a>
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i> <span data-i18n="subjects">Fanlar</span>
                </a>
                <a href="all.html" class="nav-link">
                    <i class="fas fa-th-list"></i> <span data-i18n="all">Barchasi</span>
                </a>
                <a href="settings.html" class="nav-link active">
                    <i class="fas fa-cog"></i> <span data-i18n="settings">Sozlamalar</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Chiqish</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2><i class="fas fa-cog"></i> <span data-i18n="settings_title">Sozlamalar</span></h2>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">
                            <span id="userInitial">C</span>
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Admin</p>
                            <p class="user-role text-muted">Admin Customer</p>
                        </div>
                    </div>
                </div>
            </header>

            <section class="settings-container">
                <div class="settings-card">
                    <h3><i class="fas fa-palette"></i> <span data-i18n="appearance">Tashqi ko'rinish</span></h3>
                    <div class="theme-options">
                        <button class="theme-option" data-theme="light">
                            <i class="fas fa-sun"></i>
                            <span data-i18n="light">Yoruq</span>
                        </button>
                        <button class="theme-option" data-theme="dark">
                            <i class="fas fa-moon"></i>
                            <span data-i18n="dark">Qorong'u</span>
                        </button>
                        <button class="theme-option active" data-theme="auto">
                            <i class="fas fa-desktop"></i>
                            <span data-i18n="auto">Avto</span>
                        </button>
                    </div>
                </div>

                <div class="settings-card">
                    <h3><i class="fas fa-globe"></i> <span data-i18n="language">Til</span></h3>
                    <div id="languageSelector"></div>
                </div>

                <div class="settings-card">
                    <h3><i class="fas fa-user"></i> <span data-i18n="profile">Profil</span></h3>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> <span data-i18n="full_name">To'liq ism</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="fullName" placeholder="Admin Customer" data-i18n-placeholder="full_name" />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> <span data-i18n="phone">Telefon</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="phone" placeholder="+998 90 123 45 67" data-i18n-placeholder="phone" />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-school"></i> <span data-i18n="school_name">O'quv markazi nomi</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="schoolName" placeholder="Nurli Ta'lim Markazi" data-i18n-placeholder="school_name" />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                        </div>
                    </div>
                    <button class="btn-primary" id="saveProfileBtn">
                        <i class="fas fa-save"></i> <span data-i18n="save">Saqlash</span>
                    </button>
                </div>

                <!-- PAROL BOSHQARISH O'CHIRILDI -->

                <div class="settings-card danger">
                    <h3><i class="fas fa-exclamation-triangle"></i> <span data-i18n="danger_zone">Xavfli hudud</span></h3>
                    <p data-i18n="delete_account_warning">Hisobingizni o'chirishni xohlaysizmi? Bu amal qaytarib bo'lmaydi!</p>
                    <button class="btn-danger" id="deleteAccountBtn">
                        <i class="fas fa-trash"></i> <span data-i18n="delete_account">Hisobni o'chirish</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
