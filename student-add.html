<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Customer - Yangi O'quvchi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/input.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-crown"></i></div>
                <span>Admin Customer</span>
                <span class="brand-version">v1.0</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" data-i18n="dashboard">
                    <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
                </a>
                <a href="teachers.html" class="nav-link" data-i18n="teachers">
                    <i class="fas fa-chalkboard-teacher"></i> <span>O'qituvchilar</span>
                </a>
                <a href="students.html" class="nav-link active" data-i18n="students">
                    <i class="fas fa-graduation-cap"></i> <span>O'quvchilar</span>
                </a>
                <a href="payments.html" class="nav-link" data-i18n="payments">
                    <i class="fas fa-money-bill"></i> <span>To'lovlar</span>
                </a>
                 <a href="attendance.html" class="nav-link">
                    <i class="fas fa-calendar-check"></i> <span data-i18n="attendance">Davomat</span>
                </a>
                <a href="reports.html" class="nav-link" data-i18n="reports">
                    <i class="fas fa-file-alt"></i> <span>Hisobotlar</span>
                </a>
                <a href="subjects.html" class="nav-link" data-i18n="subjects">
                    <i class="fas fa-book"></i> <span>Fanlar</span>
                </a>
                <a href="settings.html" class="nav-link" data-i18n="settings">
                    <i class="fas fa-cog"></i> <span>Sozlamalar</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Chiqish</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 data-i18n="add_student"><i class="fas fa-user-graduate"></i> Yangi O'quvchi</h2>
                        <p class="text-muted" data-i18n="students_desc">Yangi o'quvchi qo'shish</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-small" id="themeToggleSmall"><i class="fas fa-moon"></i></button>
                    <a href="students.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> <span data-i18n="back">Orqaga</span></a>
                </div>
            </header>

            <section class="form-container">
                <form id="addStudentForm" class="app-form">
                    <div class="form-group">
                        <label for="fullName"><i class="fas fa-user"></i> <span data-i18n="full_name">F.I.SH</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="fullName" placeholder="Aliyev Alisher" required />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> <span data-i18n="email">Email</span></label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="student@example.com" />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone"><i class="fas fa-phone"></i> <span data-i18n="phone">Telefon</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="phone" placeholder="+998 90 123 45 67" />
                            <i class="fas fa-check-circle input-icon success"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> <span data-i18n="password">Parol</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Bo'sh qoldirilsa avtomatik yaratiladi" minlength="6" />
                            <i class="fas fa-check-circle input-icon success"></i>
                            <i class="fas fa-exclamation-circle input-icon error"></i>
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="input-help">Parol bo'sh qoldirilsa, tizim avtomatik ravishda yangi parol yaratadi.</small>
                    </div>

                    <div class="form-group">
                        <label for="teacherId"><i class="fas fa-chalkboard-teacher"></i> <span data-i18n="teacher">O'qituvchi</span></label>
                        <div class="input-wrapper">
                            <select id="teacherId" required>
                                <option value="" data-i18n="select_teacher">O'qituvchi tanlang...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="btn-primary"><i class="fas fa-save"></i> <span data-i18n="save">Saqlash</span></button>
                        <a href="students.html" class="btn-secondary"><span data-i18n="cancel">Bekor qilish</span></a>
                    </div>
                </form>

                <div id="formMessage" class="form-message"></div>
            </section>
        </main>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon moon"></i>
        <i class="fas fa-sun sun"></i>
    </button>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/student-add.js"></script>
</body>
</html>
